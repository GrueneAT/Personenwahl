<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Personenauswahl — stratifizierte Zufallsauswahl</title>
    <!-- Grüne-AT Design System (v2.0, see issue #12). Loaded from CDN — never
         vendored. Carries the brand tokens (`--gat-color-*`, `--gat-web-*`),
         the typography stack (Barlow Semi Condensed et al.), the
         `.gat-skiplink` utility, and the brand assets we link in markup.
         Pinned to the project page via the canonical URL; CDN refresh
         delivers v2.1+ automatically once design-system#13 ships. -->
    <link
      rel="stylesheet"
      href="https://design-system.gruene.at/design-system.css"
    />
    <!-- Typography is loaded via the design-system CSS above (Barlow Semi
         Condensed + Vollkorn from Google Fonts). Self-hosted woff2 assets
         are gone (Phase 2 of #12); the brand stack is fully CDN-driven. -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <!-- Favicon: Grüne-AT wordmark from the design-system CDN. Same source
         as the Brand block in `src/shell/Brand.tsx` — single brand-asset
         origin, no vendoring. -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://design-system.gruene.at/assets/gruene-logo.svg"
    />
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased">
    <!-- Einheitliche Gruene-AT-CI-Brandbar (identisch zu den anderen
         Werkzeugen). Statisch im HTML, damit sie vor der Solid-Hydration
         steht und ueber alle Ansichten stabil bleibt. -->
    <header class="gat-header">
      <div class="gat-header__inner">
        <a class="gat-header__brand" href="/" data-testid="brand">
          <img class="gat-header__logo"
               src="https://design-system.gruene.at/assets/gruene-logo.svg"
               alt="Die Grünen" width="150" height="132" />
          <span class="gat-header__wordmark">Personenauswahl</span>
          <!-- BETA-Stoerer: schief gestellter Magenta-Stempel aus dem DS,
               identisch zu Gemeindefinanzen. Macht sofort sichtbar, dass das
               Werkzeug noch in der Beta-Phase ist. -->
          <span class="gat-stoerer gat-stoerer--magenta app-beta-marker"
                aria-label="Beta-Version">BETA</span>
        </a>
        <nav class="gat-header__nav" aria-label="Werkzeug-Navigation">
          <ul class="gat-header__nav-list">
            <li><a href="https://werkzeuge.gruene.at/">Werkzeuge</a></li>
          </ul>
          <a href="mailto:florian.motlik@gruene.at"
             class="gat-header__support"
             title="Bei Fragen oder Feedback an den Betreuer dieses Werkzeugs schreiben"
             aria-label="Support-E-Mail an florian.motlik@gruene.at">
            <svg class="gat-header__support-icon" aria-hidden="true" width="18"
                 height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <path d="M3 7l9 6 9-6"/>
            </svg>
            <span class="gat-header__support-label">florian.motlik@gruene.at</span>
          </a>
        </nav>
      </div>
    </header>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
